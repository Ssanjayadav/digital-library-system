{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}

<div class="landing">

    <form method="POST"
        class="bg-white text-gray-500 max-w-[380px] w-full p-6 text-left text-sm rounded-xl shadow-[0px_0px_10px_0px] shadow-black/10">

        <h2 class="text-2xl font-semibold mb-6 text-center text-gray-800">
            Create Account
        </h2>

        {% if error %}
        <p class="error-msg">{{ error }}</p>
        {% endif %}

        <input name="name" type="text" placeholder="Enter your name" required
            class="w-full border my-3 border-gray-500/30 outline-none rounded-full py-2.5 px-4">

        <input name="email" type="email" placeholder="Enter your email" required
            class="w-full border my-3 border-gray-500/30 outline-none rounded-full py-2.5 px-4">

        <input name="password" type="password" placeholder="Enter your password" required
            class="w-full border my-3 border-gray-500/30 outline-none rounded-full py-2.5 px-4">

        <div class="flex justify-center my-3">

            <div class="flex space-x-2 bg-white p-1 border border-gray-300 rounded-full text-sm">

                <div class="flex items-center">
                    <input type="radio" name="role" value="student" id="student" class="hidden peer" required>

                    <label for="student" class="cursor-pointer rounded-full py-2 px-6 text-gray-500 transition-colors duration-200
                          peer-checked:bg-indigo-600 peer-checked:text-white">
                        Student
                    </label>
                </div>

                <div class="flex items-center">
                    <input type="radio" name="role" value="librarian" id="librarian" class="hidden peer" required>

                    <label for="librarian" class="cursor-pointer rounded-full py-2 px-6 text-gray-500 transition-colors duration-200
                          peer-checked:bg-indigo-600 peer-checked:text-white">
                        Librarian
                    </label>
                </div>

            </div>

        </div>

        <button type="submit"
            class="w-full mt-3 bg-indigo-500 hover:bg-indigo-600/90 active:scale-95 transition py-2.5 rounded-full text-white">
            Register
        </button>

        <p class="text-center mt-4 text-gray-600">
            Already have an account?
            <a href="/login"
                style="background:none;padding:0;margin:0;display:inline;color:#2563eb;text-decoration:underline;">
                Login
            </a>
        </p>

    </form>

</div>

{% endblock %}
