{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}

<div class="landing">

<form method="POST"
      class="bg-white text-gray-500 max-w-[350px] w-full p-6 text-left text-sm rounded-xl shadow-[0px_0px_10px_0px] shadow-black/10">

    <h2 class="text-2xl font-semibold mb-6 text-center text-gray-800">
        Login Now
    </h2>

    {% if error %}
        <p class="error-msg">{{ error }}</p>
    {% endif %}

    <input name="email"
           class="w-full border my-3 border-gray-500/30 outline-none rounded-full py-2.5 px-4"
           type="email"
           placeholder="Enter your email"
           required>

    <input name="password"
           class="w-full border mt-1 border-gray-500/30 outline-none rounded-full py-2.5 px-4"
           type="password"
           placeholder="Enter your password"
           required>

    <button  type="submit"
            class="w-full mb-3 bg-indigo-500 hover:bg-indigo-600/90 active:scale-95 transition py-2.5 rounded-full text-white" style="margin-top: 15px;">
        Log in
    </button>

    <p class="not-btn" style="color: black;">
    Don’t have an account?
    <a href="/register"
       class="not-btn" style="background:none;padding:0;margin:0;display:inline;color:#2563eb">
        Register Now
    </a>
</p>

</form>

</div>

{% endblock %}
